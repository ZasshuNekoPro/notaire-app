version: "3.9"

# ============================================================
# NOTAIRE APP — Docker Compose
#
# Démarrage complet  :  docker compose up -d
# Avec IA locale     :  docker compose --profile ollama up -d
# Mode dev complet   :  docker compose --profile ollama --profile dev up -d
# ============================================================

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: notaire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notaire_app}
      POSTGRES_USER: ${POSTGRES_USER:-notaire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notaire}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notaire-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: notaire-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./packages/api/src:/app/src
      - ./packages/ai-core:/app/ai-core
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    container_name: notaire-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  ollama:
    image: ollama/ollama:latest
    container_name: notaire-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  adminer:
    image: adminer:latest
    container_name: notaire-adminer
    profiles: ["dev"]
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  ollama_models:

networks:
  default:
    name: notaire-network
